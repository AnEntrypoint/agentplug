name: release

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - '.github/workflows/release.yml'
  workflow_dispatch:

concurrency:
  group: agentplug-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: agentplug-runner-windows-x64.exe
            bin_name: agentplug-runner.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: agentplug-runner-windows-arm64.exe
            bin_name: agentplug-runner.exe
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: agentplug-runner-macos-x64
            bin_name: agentplug-runner
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: agentplug-runner-macos-arm64
            bin_name: agentplug-runner
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: agentplug-runner-linux-x64
            bin_name: agentplug-runner
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: agentplug-runner-linux-arm64
            bin_name: agentplug-runner
            cross: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: agentplug-runner-${{ matrix.target }}
          workspaces: '. -> target'

      - name: Install cross (aarch64-linux cross-compile)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: '!matrix.cross'
        run: cargo build --release -p agentplug-runner --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release -p agentplug-runner --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "dist/${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    # No `needs: build` -- see rs-plugkit's gm-runner.yml for the full
    # rationale (a single stuck-queued matrix leg with no assigned runner
    # blocks `needs.build` from ever resolving even under `if: always()`).
    # Same bounded-poll-then-release-what-exists pattern, ported verbatim.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Read version
        id: ver
        run: echo "version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *\"//;s/\"//')" >> "$GITHUB_OUTPUT"

      - name: Wait for as many build-matrix artifacts as show up within a bound
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          for i in $(seq 1 20); do
            count=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" --jq '.total_count')
            echo "poll $i: $count artifact(s) so far"
            if [ "$count" -ge 6 ]; then
              echo "all 6 platform artifacts present"
              break
            fi
            sleep 30
          done

      - uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          path: artifacts

      - name: Stage release assets with checksums
        run: |
          mkdir -p release-assets artifacts
          shopt -s nullglob
          files=(artifacts/*/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no build artifacts available yet -- skipping release"
            exit 0
          fi
          for f in "${files[@]}"; do
            name=$(basename "$f")
            cp "$f" "release-assets/$name"
            sha256sum "release-assets/$name" | sed 's/ \*/  /' > "release-assets/$name.sha256"
          done
          ls -la release-assets
          echo "have_assets=true" >> "$GITHUB_ENV"

      - name: Publish to agentplug-bin Release
        if: env.have_assets == 'true'
        env:
          GH_TOKEN: ${{ secrets.PUBLISHER_TOKEN }}
          VER: ${{ steps.ver.outputs.version }}
        run: |
          set -e
          if ! gh release view "v$VER" --repo AnEntrypoint/agentplug-bin >/dev/null 2>&1; then
            gh release create "v$VER" \
              --repo AnEntrypoint/agentplug-bin \
              --title "agentplug-runner v$VER" \
              --notes "Native cross-platform wasm plugin-host runner, auto-published from agentplug CI at $GITHUB_SHA"
          fi
          gh release upload "v$VER" --repo AnEntrypoint/agentplug-bin --clobber release-assets/*
